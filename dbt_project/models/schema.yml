version: 2

models:
  - name: dim_patients
    description: "Dimension table for patients (3NF)"
    columns:
      - name: patient_id
        tests:
          - unique
          - not_null

  - name: dim_doctors
    description: "Dimension table for doctors (3NF)"
    columns:
      - name: doctor_id
        tests:
          - unique
          - not_null

  - name: dim_departments
    description: "Dimension table for hospital departments (3NF)"
    columns:
      - name: department_id
        tests:
          - unique
          - not_null

  - name: dim_diagnoses
    description: "Dimension table for ICD diagnosis codes (3NF)"
    columns:
      - name: diagnosis_code
        tests:
          - unique
          - not_null

  - name: dim_medications
    description: "Dimension table for medications and dosages (3NF)"
    columns:
      - name: medication_id
        tests:
          - unique
          - not_null

  - name: fact_visits
    description: "Fact table for patient hospital visits with billing"
    columns:
      - name: patient_id
        tests:
          - not_null
      - name: visit_date
        tests:
          - not_null

  - name: patient_doctors
    description: "Many-to-many junction: patients to doctors"
    columns:
      - name: patient_id
        tests:
          - not_null
      - name: doctor_id
        tests:
          - not_null

  - name: patient_diagnoses
    description: "Many-to-many junction: patients to diagnoses"
    columns:
      - name: patient_id
        tests:
          - not_null
      - name: diagnosis_code
        tests:
          - not_null

  - name: patient_medications
    description: "Many-to-many junction: patients to medications"
    columns:
      - name: patient_id
        tests:
          - not_null
      - name: medication_id
        tests:
          - not_null
